spring:
  application:
    name: running-crew-backend

  # 기본(로컬) 프로필: MySQL localhost. Docker Compose는 SPRING_DATASOURCE_URL 환경변수로 오버라이드.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/runningcrew?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:runningcrew}
    password: ${SPRING_DATASOURCE_PASSWORD:runningcrew}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      # 스키마 진실은 Flyway. Hibernate는 검증만 — 배치 B1에서 none → validate 승격
      # (Testcontainers 라이브 검증 JpaSchemaValidationLiveTest가 근거. 배치 A 보류-1 해소).
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC   # MySQL 세션 타임존 UTC 고정(저장·비교·판정 전부 UTC)
        # R-003 파생 선제 해소: 모든 식별자 전역 인용 — rank 등 MySQL 예약어 컬럼이
        # M2에 엔티티로 등장해도 JPA가 안전하게 인용한다(설계 12 §5).
        globally_quoted_identifiers: true
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  # 시각/직렬화 규약(계약 conventions.md §2·§3)
  jackson:
    property-naming-strategy: SNAKE_CASE      # JSON 필드 snake_case
    default-property-inclusion: non_null
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false        # Instant → ISO-8601(Z) 문자열

# actuator health 노출
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# 구조화 로그 기본(운영 스킬: JSON 로그). 로컬 가독성을 위해 기본은 콘솔, 운영 프로필에서 JSON 인코더 배선 예정.
logging:
  level:
    root: INFO
    com.runningcrew: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'} %-5level [%thread] %logger{36} - %msg%n"

server:
  port: 8080

# JWT (계약 auth-api.md 확정 스펙: HS256, access 30분 / refresh 30일)
# 시크릿은 env JWT_SECRET(≥256bit) — 기본 프로필엔 기본값 없음(미설정 시 부팅 실패 fail-fast).
jwt:
  secret: ${JWT_SECRET:}
  access-ttl-seconds: 1800
  refresh-ttl-seconds: 2592000

---
# local 프로필 — 개발 편의 기본값. 스텁 카카오 검증기(@Profile local/dev)와 세트.
# prod/프로필 미지정에서는 스텁 빈이 없어 부팅 실패(fail-fast) — 스텁의 운영 유출을 구조로 차단.
spring:
  config:
    activate:
      on-profile: local
jwt:
  secret: ${JWT_SECRET:local-dev-only-jwt-secret-do-not-use-in-prod-0123456789abcdef}
