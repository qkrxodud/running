# 러닝크루 운영(prod) 풀스택 — Spring Boot + MySQL 8. 앱 8080 / MySQL 3306.
# restart: unless-stopped (정전 복구 무인 재기동 전제, backend-hexagonal 스킬).
# 프로필 prod: 스텁 카카오·시더 없음. JWT_SECRET env 필수(미설정 시 기동 거부).
# 실행: JWT_SECRET=... docker compose up -d --build
# 주의: 실 카카오 어댑터(@Profile prod) 배선 전까지 KakaoTokenVerifier 빈 부재로 부팅 실패(의도된 fail-fast).
name: runningcrew
services:
  mysql:
    image: mysql:8.0
    container_name: runningcrew-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: runningcrew
      MYSQL_USER: runningcrew
      MYSQL_PASSWORD: runningcrew
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    command:
      - --default-time-zone=+00:00       # MySQL 서버 타임존 UTC 고정
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: runningcrew-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/runningcrew?connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: runningcrew
      SPRING_DATASOURCE_PASSWORD: runningcrew
      SPRING_PROFILES_ACTIVE: prod
      # 운영 시크릿 — 반드시 호스트 env로 주입(기본값 없음, 미설정 시 compose가 기동 거부).
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set for prod}
      TZ: UTC
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  mysql-data:
